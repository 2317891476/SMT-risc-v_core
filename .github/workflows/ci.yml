name: RISC-V CPU CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y iverilog

    - name: Install RISC-V toolchain
      run: |
        wget -q https://github.com/xpack-dev-tools/riscv-none-elf-gcc-xpack/releases/download/v13.2.0-1/xpack-riscv-none-elf-gcc-13.2.0-1-linux-x64.tar.gz
        tar -xzf xpack-riscv-none-elf-gcc-13.2.0-1-linux-x64.tar.gz
        echo "$PWD/xpack-riscv-none-elf-gcc-13.2.0-1/bin" >> $GITHUB_PATH

    - name: Run Basic Tests (Core + Store Buffer)
      run: |
        export PATH="$PWD/xpack-riscv-none-elf-gcc-13.2.0-1/bin:$PATH"
        python verification/run_all_tests.py --basic 2>&1 | tee basic_test.log
        # Check if all tests passed
        if grep -q "failed, 0 skipped" basic_test.log | grep -qv "0 failed"; then
          echo "Basic tests FAILED"
          exit 1
        fi
        echo "Basic tests PASSED"

    - name: Run riscv-tests (Classic Test Suite)
      run: |
        export PATH="$PWD/xpack-riscv-none-elf-gcc-13.2.0-1/bin:$PATH"
        python verification/run_all_tests.py --riscv-tests 2>&1 | tee riscv_tests.log
        # Check results - allow fence_i failure
        if grep -q "failed" riscv_tests.log | grep -qv "fence_i"; then
          echo "riscv-tests FAILED"
          exit 1
        fi
        echo "riscv-tests PASSED"

    - name: Run riscv-arch-test (Official Architecture Tests)
      run: |
        export PATH="$PWD/xpack-riscv-none-elf-gcc-13.2.0-1/bin:$PATH"
        python verification/run_all_tests.py --riscv-arch-test 2>&1 | tee arch_test.log
        # All arch tests should pass
        if grep -q "failed" arch_test.log; then
          echo "riscv-arch-test FAILED"
          exit 1
        fi
        echo "riscv-arch-test PASSED"

    - name: Run Full Regression
      run: |
        export PATH="$PWD/xpack-riscv-none-elf-gcc-13.2.0-1/bin:$PATH"
        python verification/run_all_tests.py --basic --riscv-tests --riscv-arch-test 2>&1 | tee full_regression.log
        # Check overall result
        if grep -q "failed, 0 skipped" full_regression.log | grep -qv "0 failed"; then
          echo "Full regression FAILED"
          exit 1
        fi
        echo "Full regression PASSED"

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          *.log
          comp_test/out_iverilog/logs/
